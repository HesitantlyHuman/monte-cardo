<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <base data-trunk-public-url />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link data-trunk rel="rust" data-bin="monte-cardo-web" data-type="main" />

  <link data-trunk rel="rust" data-bin="solver_worker" data-type="worker" data-loader-shim />

  <link data-trunk rel="copy-file" href="assets/logo.svg" />

  <title>Monte Cardo</title>

  <style>
    :root {
      --footer-height: 48px;

      --tui-background: #000;
      --tui-text: #bcbcbc;
      --tui-text-bright: #efefef;
      --tui-muted: #777;
      --tui-border: #303030;
      --tui-green: #009b12;
    }

    #monte-cardo-stage {
      position: fixed;
      inset: 0 0 var(--footer-height) 0;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
      background: var(--tui-background);
    }

    .demo-footer {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;

      height: var(--footer-height);
      padding: 0 20px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      border-top: 1px solid var(--tui-border);
      background: var(--tui-background);

      font-family:
        "DejaVu Sans Mono",
        "Liberation Mono",
        "Courier New",
        monospace;
      font-size: 13px;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 9px;

      color: var(--tui-muted);
      text-decoration: none;

      transition:
        color 100ms ease,
        background-color 100ms ease;
    }

    .footer-link:hover,
    .footer-link:focus-visible {
      color: var(--tui-text-bright);
    }

    .footer-link:focus-visible {
      outline: 1px solid var(--tui-green);
      outline-offset: 5px;
    }

    .footer-logo,
    .footer-icon {
      display: block;
      width: 19px;
      height: 19px;
      flex: none;
    }

    .footer-logo {
      object-fit: contain;
    }

    .footer-icon {
      color: currentColor;
    }

    @media (max-width: 620px) {
      .demo-footer {
        padding-inline: 14px;
      }

      .footer-repository span {
        display: none;
      }
    }

    .touch-notice {
      position: fixed;
      left: 50%;
      bottom: 62px;
      z-index: 20;

      width: min(580px, calc(100% - 28px));
      padding: 12px 14px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;

      transform: translateX(-50%);

      border: 1px solid #444;
      background: rgb(0 0 0 / 96%);
      color: #aaa;

      font-family:
        "DejaVu Sans Mono",
        "Liberation Mono",
        "Courier New",
        monospace;
      font-size: 13px;
    }

    .touch-notice[hidden] {
      display: none;
    }

    .touch-notice__message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .touch-notice__message h3 {
      color: #eee;
      font-weight: normal;
    }

    .touch-notice__dismiss {
      flex: none;

      padding: 7px 10px;

      border: 1px solid #555;
      background: #000;
      color: #aaa;

      font: inherit;
      cursor: pointer;
    }

    .touch-notice__dismiss:hover,
    .touch-notice__dismiss:focus-visible {
      border-color: #009b12;
      color: #eee;
    }

    .touch-notice__dismiss:focus-visible {
      outline: 1px solid #009b12;
      outline-offset: 2px;
    }

    @media (max-width: 560px) {
      .touch-notice {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .touch-notice__dismiss {
        align-self: flex-start;
      }
    }
  </style>
</head>

<body>
  <div id="monte-cardo-stage">
    <div id="monte-cardo-root"></div>
  </div>

  <aside id="touch-notice" class="touch-notice" aria-live="polite" hidden>
    <div class="touch-notice__message">
      <h3>Keyboard required</h3>

      <span>
        Monte Cardo uses the arrow keys, Enter, Tab, and Escape for navigation.
        Touch controls are not currently supported.
      </span>
    </div>

    <button id="touch-notice-dismiss" class="touch-notice__dismiss" type="button">
      Continue anyway
    </button>
  </aside>

  <footer class="demo-footer">
    <a class="footer-link footer-brand" href="https://hesitantlyhuman.com" target="_blank" rel="noopener noreferrer"
      aria-label="Visit my website">
      <img class="footer-logo" src="./logo.svg" alt="" />

      <span>Tanner Sims</span>
    </a>

    <a class="footer-link footer-repository" href="https://github.com/HesitantlyHuman/monte-cardo" target="_blank"
      rel="noopener noreferrer" aria-label="View Monte Cardo on GitHub">
      <svg width="24" height="24" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M56.7937 84.9688C44.4187 83.4688 35.7 74.5625 35.7 63.0313C35.7 58.3438 37.3875 53.2813 40.2 49.9063C38.9812 46.8125 39.1687 40.25 40.575 37.5313C44.325 37.0625 49.3875 39.0313 52.3875 41.75C55.95 40.625 59.7 40.0625 64.2937 40.0625C68.8875 40.0625 72.6375 40.625 76.0125 41.6563C78.9187 39.0313 84.075 37.0625 87.825 37.5313C89.1375 40.0625 89.325 46.625 88.1062 49.8125C91.1062 53.375 92.7 58.1563 92.7 63.0313C92.7 74.5625 83.9812 83.2813 71.4187 84.875C74.6062 86.9375 76.7625 91.4375 76.7625 96.5938L76.7625 106.344C76.7625 109.156 79.1062 110.75 81.9187 109.625C98.8875 103.156 112.2 86.1875 112.2 65.1875C112.2 38.6563 90.6375 17 64.1062 17C37.575 17 16.2 38.6562 16.2 65.1875C16.2 86 29.4187 103.25 47.2312 109.719C49.7625 110.656 52.2 108.969 52.2 106.438L52.2 98.9375C50.8875 99.5 49.2 99.875 47.7 99.875C41.5125 99.875 37.8562 96.5 35.2312 90.2188C34.2 87.6875 33.075 86.1875 30.9187 85.9063C29.7937 85.8125 29.4187 85.3438 29.4187 84.7813C29.4187 83.6563 31.2937 82.8125 33.1687 82.8125C35.8875 82.8125 38.2312 84.5 40.6687 87.9688C42.5437 90.6875 44.5125 91.9063 46.8562 91.9063C49.2 91.9063 50.7 91.0625 52.8562 88.9063C54.45 87.3125 55.6687 85.9063 56.7937 84.9688Z"
          fill="currentColor" />
      </svg>

      <span>HesitantlyHuman/monte-cardo</span>
    </a>
  </footer>

  <script>
    const stage = document.getElementById("monte-cardo-stage");
    const root = document.getElementById("monte-cardo-root");

    let canvas = null;

    function fitTerminal() {
      if (!canvas) {
        canvas = root.querySelector("canvas");
      }

      if (!canvas) {
        return;
      }

      /*
       * width and height are the fixed backing dimensions supplied by Rust.
       * Do not use clientWidth/clientHeight here because those become the
       * visually scaled dimensions after this function runs.
       */
      const terminalWidth = canvas.width;
      const terminalHeight = canvas.height;

      if (terminalWidth === 0 || terminalHeight === 0) {
        return;
      }

      const bounds = stage.getBoundingClientRect();

      const scale = Math.min(
        bounds.width / terminalWidth,
        bounds.height / terminalHeight,
      );

      const displayedWidth = Math.floor(terminalWidth * scale);
      const displayedHeight = Math.floor(terminalHeight * scale);

      canvas.style.width = `${displayedWidth}px`;
      canvas.style.height = `${displayedHeight}px`;
    }

    const resizeObserver = new ResizeObserver(() => {
      fitTerminal();
    });

    resizeObserver.observe(stage);

    const mutationObserver = new MutationObserver(() => {
      canvas = root.querySelector("canvas");

      if (canvas) {
        /*
         * Wait until the current initialization call finishes. This ensures
         * Ratzilla measures the canvas before we apply visual CSS scaling.
         */
        requestAnimationFrame(fitTerminal);
      }
    });

    mutationObserver.observe(root, {
      childList: true,
    });

    requestAnimationFrame(fitTerminal);
  </script>

  <script>
    const touchNotice = document.getElementById("touch-notice");
    const touchNoticeDismiss = document.getElementById(
      "touch-notice-dismiss",
    );

    const touchNoticeStorageKey =
      "monte-cardo-touch-notice-dismissed";

    const appearsTouchCapable =
      navigator.maxTouchPoints > 0 ||
      window.matchMedia("(any-pointer: coarse)").matches;

    function dismissTouchNotice() {
      touchNotice.hidden = true;

      try {
        sessionStorage.setItem(touchNoticeStorageKey, "true");
      } catch {
        // The notice can still be dismissed when storage is unavailable.
      }
    }

    let noticeWasDismissed = false;

    try {
      noticeWasDismissed =
        sessionStorage.getItem(touchNoticeStorageKey) === "true";
    } catch {
      // Treat unavailable storage as no previous dismissal.
    }

    if (appearsTouchCapable && !noticeWasDismissed) {
      touchNotice.hidden = false;
    }

    touchNoticeDismiss.addEventListener(
      "click",
      dismissTouchNotice,
    );

    /*
     * A keyboard event demonstrates that the visitor has keyboard input.
     * This listener does not prevent or consume the event, so the same key
     * still reaches Monte Cardo.
     */
    window.addEventListener(
      "keydown",
      () => {
        if (!touchNotice.hidden) {
          dismissTouchNotice();
        }
      },
      {
        capture: true,
        once: true,
      },
    );
  </script>
</body>

</html>
